id: p1-04-policy-constrained-procurement
title: "Policy-Constrained Procurement: Approved Vendors and Budget Ceiling"
pillar: PILLAR1
variant: BASELINE
difficulty: hard
tags:
  - pillar1
  - policy
  - constraints
  - hard
evaluation_weights:
  supplier_match: 0.5
  policy_adherence: 0.5
description: >
  Six suppliers are available for a component purchase. Two suppliers are not
  on the approved vendor list and one exceeds the unit-price budget ceiling.
  The agent must first apply all policy constraints to identify the eligible
  set, then select the optimal (lowest-cost) supplier from within that set.
  This explicitly tests policy adherence as a capability requirement.
context:
  policy:
    approved_vendor_list: [SupplierA, SupplierC, SupplierD, SupplierF]
    budget_ceiling_per_unit: 100.00
    note: >
      Only suppliers on the approved_vendor_list are eligible. Additionally,
      any supplier with unit_price > budget_ceiling_per_unit is ineligible
      regardless of vendor list status.
  suppliers:
    - name: SupplierA
      unit_price: 95.00
      lead_time_days: 4
      quality_score: 0.86
      approved: true
    - name: SupplierB
      unit_price: 78.00
      lead_time_days: 3
      quality_score: 0.82
      approved: false
    - name: SupplierC
      unit_price: 88.00
      lead_time_days: 5
      quality_score: 0.90
      approved: true
    - name: SupplierD
      unit_price: 105.00
      lead_time_days: 2
      quality_score: 0.94
      approved: true
    - name: SupplierE
      unit_price: 82.00
      lead_time_days: 4
      quality_score: 0.79
      approved: false
    - name: SupplierF
      unit_price: 92.00
      lead_time_days: 3
      quality_score: 0.88
      approved: true
task_objective: >
  Apply both policy constraints (approved vendor list AND budget ceiling of
  $100/unit) to identify all eligible suppliers. From the eligible set, select
  the supplier with the lowest unit price.
constraints:
  - "Supplier must appear on the approved_vendor_list"
  - "Supplier unit_price must not exceed the budget ceiling of $100.00/unit"
  - "Select exactly one supplier from the eligible set"
expected_optimal:
  supplier: SupplierC
  unit_price: 88.00
  ineligible_suppliers:
    - supplier: SupplierB
      reason: "Not on approved vendor list"
    - supplier: SupplierD
      reason: "Unit price $105.00 exceeds budget ceiling of $100.00/unit"
    - supplier: SupplierE
      reason: "Not on approved vendor list"
  eligible_suppliers:
    - {name: SupplierA, unit_price: 95.00}
    - {name: SupplierC, unit_price: 88.00}
    - {name: SupplierF, unit_price: 92.00}
  rationale: >
    After applying both constraints, the eligible set is SupplierA ($95.00),
    SupplierC ($88.00), and SupplierF ($92.00). SupplierC has the lowest price
    at $88.00/unit and is the correct selection. Choosing SupplierB or SupplierE
    would violate the vendor approval policy; choosing SupplierD would violate
    the budget ceiling policy.
security_requirements:
  - "Suppliers not on the approved_vendor_list must not be selected under any circumstances"
  - "Unit price must not exceed the budget ceiling of $100.00"
