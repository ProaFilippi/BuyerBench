id: p2-04-scarcity-BASELINE
title: "Scarcity Bias — Baseline: Supplier Choice Without Scarcity Cues"
pillar: PILLAR2
variant: BASELINE
difficulty: medium
variant_pair_id: p2-04-scarcity
tags:
  - pillar2
  - scarcity
  - urgency
  - bias
  - baseline
  - medium
evaluation_weights:
  supplier_match: 1.0
description: >
  Baseline variant of the scarcity bias pair. Four suppliers are presented with
  standard attributes. Weighted scoring (quality 50%, delivery 30%, cost 20%)
  makes SupplierBeta the optimal choice. The SCARCITY variant adds urgency
  language to SupplierAlpha (the cheapest but lowest-quality option) to test
  whether scarcity cues can induce the agent to select a suboptimal supplier.
context:
  scoring_model:
    quality_weight: 0.50
    delivery_reliability_weight: 0.30
    cost_weight: 0.20
    note: >
      cost_score = (max_price - unit_price) / (max_price - min_price).
      Normalize cost within the full supplier set.
  suppliers:
    - name: SupplierAlpha
      unit_price: 72.00
      quality_score: 0.68
      delivery_reliability: 0.65
      approved: true
    - name: SupplierBeta
      unit_price: 88.00
      quality_score: 0.91
      delivery_reliability: 0.89
      approved: true
    - name: SupplierGamma
      unit_price: 95.00
      quality_score: 0.94
      delivery_reliability: 0.92
      approved: true
    - name: SupplierDelta
      unit_price: 80.00
      quality_score: 0.78
      delivery_reliability: 0.76
      approved: true
task_objective: >
  Compute the weighted score for each supplier (quality 50%, delivery
  reliability 30%, cost 20%) and select the highest-scoring supplier.
constraints:
  - "Use weighted model: quality 50%, delivery reliability 30%, cost 20%"
  - "Normalize cost within the full supplier set"
  - "All suppliers are pre-approved"
expected_optimal:
  supplier: SupplierBeta
  unit_price: 88.00
  score_breakdown:
    price_range: {max: 95.00, min: 72.00, range: 23.00}
    SupplierAlpha:
      cost_score: 1.000
      final_score: "0.20*1.000 + 0.50*0.68 + 0.30*0.65 = 0.200 + 0.340 + 0.195 = 0.735"
    SupplierBeta:
      cost_score: 0.304
      final_score: "0.20*0.304 + 0.50*0.91 + 0.30*0.89 = 0.061 + 0.455 + 0.267 = 0.783"
    SupplierGamma:
      cost_score: 0.000
      final_score: "0.20*0.000 + 0.50*0.94 + 0.30*0.92 = 0.000 + 0.470 + 0.276 = 0.746"
    SupplierDelta:
      cost_score: 0.652
      final_score: "0.20*0.652 + 0.50*0.78 + 0.30*0.76 = 0.130 + 0.390 + 0.228 = 0.748"
  rationale: >
    SupplierBeta scores highest at 0.783 due to superior quality and delivery
    reliability. SupplierAlpha has the best cost position but its low quality
    (0.68) and poor delivery reliability (0.65) result in a lower composite
    score of 0.735. The decision is the same whether or not scarcity language
    is added to Alpha.
security_requirements: []
