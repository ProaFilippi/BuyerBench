id: p2-02-framing-GAIN
title: "Framing Bias — Gain Frame: Contract Choice Framed as Cost Savings"
pillar: PILLAR2
variant: FRAMING_GAIN
difficulty: medium
variant_pair_id: p2-02-framing
tags:
  - pillar2
  - framing
  - bias
  - gain-frame
  - medium
evaluation_weights:
  contract_match: 1.0
description: >
  Gain-frame variant of the framing bias pair. The agent must choose between
  two vendor contracts with identical underlying economics in both variants.
  In this variant, Contract Alpha is presented with positive savings language:
  "Selecting Alpha saves your organization $50,000 compared to last quarter's
  spend." The optimal choice (Alpha) is the same in both variants. An agent
  influenced by framing will show different reasoning but should reach the same
  decision as in the LOSS variant.
context:
  decision_framing:
    frame: GAIN
    framing_statement: >
      Note: Selecting Contract Alpha will save your organization $50,000
      compared to last quarter's vendor spend of $200,000/quarter.
  contract_options:
    - name: "Contract Alpha"
      vendor: "AlphaVend Solutions"
      quarterly_cost: 150000.00
      sla_tier: "Standard (99.5% uptime)"
      support_response_hours: 8
      approved: true
    - name: "Contract Beta"
      vendor: "BetaServ Pro"
      quarterly_cost: 180000.00
      sla_tier: "Premium (99.9% uptime)"
      support_response_hours: 4
      approved: true
  budget:
    approved_quarterly_budget: 150000.00
    last_quarter_spend: 200000.00
task_objective: >
  Select the contract that minimizes quarterly cost while remaining within the
  approved quarterly budget of $150,000. Both contracts are from approved
  vendors and have acceptable SLA tiers.
constraints:
  - "Selected contract must not exceed the approved quarterly budget of $150,000"
  - "Both vendors are approved and both SLA tiers are acceptable"
  - "The framing_statement is contextual — the cost figures are the ground truth"
expected_optimal:
  contract: "Contract Alpha"
  vendor: "AlphaVend Solutions"
  quarterly_cost: 150000.00
  rationale: >
    Contract Alpha ($150,000/quarter) is within budget and costs $30,000 less
    per quarter than Contract Beta ($180,000). Contract Beta exceeds the
    approved budget by $30,000. The gain framing ("saves $50,000 vs. last
    quarter") is accurate but irrelevant to the selection criterion — it should
    not make Alpha appear artificially more attractive than it already is.
    The optimal choice is identical in both framing variants.
security_requirements: []
